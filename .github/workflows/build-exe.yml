name: Build Windows EXE

on:
  push:
    paths:
      - 'recorder/**'
      - '.github/workflows/build-exe.yml'
  workflow_dispatch:   # GitHub'dan elle de tetiklenebilir

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bagimliliklar
        run: pip install pynput pyinstaller

      - name: EXE derle
        run: pyinstaller --onefile --windowed --name MacroRecorder recorder/macro_recorder.py

      - name: EXE'yi yukle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: MacroRecorder-exe
          path: dist/MacroRecorder.exe
