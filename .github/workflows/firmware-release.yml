name: Firmware release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  # Pinned CircuitPython library versions bundled into the firmware zip
  NEOPIXEL_REF: "6.4.2"

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # The firmware version is firmware/VERSION, decoupled from app releases —
      # the app compares its bundled firmware/VERSION with the device, so only
      # releases that actually change firmware/ should bump it. The zip is
      # named after the firmware version, not the release tag.
      - name: Read firmware version
        run: echo "FW_VERSION=$(cat firmware/VERSION | tr -d '[:space:]')" >> "$GITHUB_ENV"
      - name: Fetch bundled libraries
        run: |
          mkdir -p firmware/lib
          curl -sfL "https://raw.githubusercontent.com/adafruit/Adafruit_CircuitPython_NeoPixel/${NEOPIXEL_REF}/neopixel.py" \
            -o firmware/lib/neopixel.py
      - name: Prepare default config
        run: cp firmware/config.example.json firmware/config.json
      - name: Zip firmware
        run: |
          cd firmware
          zip -r "../mkyada-firmware-v${FW_VERSION}.zip" . -x "*.pyc"
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: mkyada-firmware-*.zip
      - name: Upload artifact (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: mkyada-firmware
          path: mkyada-firmware-*.zip
