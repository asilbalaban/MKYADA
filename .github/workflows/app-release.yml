name: App release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            targets: ""
          # universal .app/.dmg for Intel + Apple Silicon (unsigned — see
          # docs/macos-install.md for the Gatekeeper bypass)
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Linux packages planned next:
          # - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    env:
      # release installers must ship precompiled .mpy firmware — a source-only
      # bundle would reintroduce the on-device-compile MemoryError risk
      MKYADA_REQUIRE_MPY: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - name: Install frontend deps
        working-directory: app
        run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "MKYADA ${{ github.ref_name }}"
          releaseBody: |
            MKYADA — Macro Keypad You Always Dream About.

            **Desktop app installers** are attached below (Windows `.exe`/`.msi`,
            macOS universal `.dmg`).

            **macOS users:** the app is unsigned — after installing, clear the
            quarantine flag once, then open normally:

            ```sh
            xattr -cr /Applications/MKYADA.app
            ```

            (Alternative: System Settings → Privacy & Security → **Open Anyway**.
            Details: [docs/macos-install.md](https://github.com/asilbalaban/MKYADA/blob/main/docs/macos-install.md).)

            **Firmware**: download `mkyada-firmware-*.zip` and follow
            [docs/firmware-install.md](https://github.com/asilbalaban/MKYADA/blob/main/docs/firmware-install.md).
          releaseDraft: false
          prerelease: false
